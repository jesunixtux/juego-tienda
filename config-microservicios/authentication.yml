server:
  port: "${AUTHENTICATION_PORT:0}"

spring:
  datasource:
    url: "jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/bd_auth?createDatabaseIfNotExist=true"
    username: "${DB_USER:root}"
    password: "${DB_PASSWORD:}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history_authentication

security:
  jwt:
    secret: "${JWT_SECRET:tienda-videojuegos-local-dev-secret-change-me-2026}"
    expiration-minutes: "${JWT_EXPIRATION_MINUTES:120}"

eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_SERVER_URL:http://localhost:8761/eureka/}"
  instance:
    hostname: "${EUREKA_INSTANCE_HOSTNAME:localhost}"
    prefer-ip-address: "${EUREKA_PREFER_IP_ADDRESS:false}"

springdoc:
  api-docs:
    path: /auth/v3/api-docs
