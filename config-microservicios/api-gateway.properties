server.port=${API_GATEWAY_PORT:8080}

security.jwt.secret=${JWT_SECRET:tienda-videojuegos-local-dev-secret-change-me-2026}

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP_ADDRESS:false}

spring.cloud.gateway.server.webflux.routes[0].id=videojuegos
spring.cloud.gateway.server.webflux.routes[0].uri=lb://videojuegos
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/videojuegos,/videojuegos/**

spring.cloud.gateway.server.webflux.routes[1].id=carrito
spring.cloud.gateway.server.webflux.routes[1].uri=lb://carrito
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/carrito,/carrito/**

spring.cloud.gateway.server.webflux.routes[2].id=usuarios
spring.cloud.gateway.server.webflux.routes[2].uri=lb://usuarios
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/usuarios,/usuarios/**

spring.cloud.gateway.server.webflux.routes[3].id=inventario
spring.cloud.gateway.server.webflux.routes[3].uri=lb://inventario
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/inventario,/inventario/**

spring.cloud.gateway.server.webflux.routes[4].id=authentication
spring.cloud.gateway.server.webflux.routes[4].uri=lb://authentication
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/auth,/auth/**

spring.cloud.gateway.server.webflux.routes[5].id=pagos
spring.cloud.gateway.server.webflux.routes[5].uri=lb://pagos
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/pagos,/pagos/**

spring.cloud.gateway.server.webflux.routes[6].id=pedidos
spring.cloud.gateway.server.webflux.routes[6].uri=lb://pedidos
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/pedidos,/pedidos/**

spring.cloud.gateway.server.webflux.routes[7].id=resenas
spring.cloud.gateway.server.webflux.routes[7].uri=lb://resenas
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/resenas,/resenas/**

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.urls[0].name=Videojuegos
springdoc.swagger-ui.urls[0].url=/videojuegos/v3/api-docs
springdoc.swagger-ui.urls[1].name=Usuarios
springdoc.swagger-ui.urls[1].url=/usuarios/v3/api-docs
springdoc.swagger-ui.urls[2].name=Authentication
springdoc.swagger-ui.urls[2].url=/auth/v3/api-docs
springdoc.swagger-ui.urls[3].name=Carrito
springdoc.swagger-ui.urls[3].url=/carrito/v3/api-docs
springdoc.swagger-ui.urls[4].name=Pagos
springdoc.swagger-ui.urls[4].url=/pagos/v3/api-docs
springdoc.swagger-ui.urls[5].name=Pedidos
springdoc.swagger-ui.urls[5].url=/pedidos/v3/api-docs
springdoc.swagger-ui.urls[6].name=Resenas
springdoc.swagger-ui.urls[6].url=/resenas/v3/api-docs
springdoc.swagger-ui.urls[7].name=Inventario
springdoc.swagger-ui.urls[7].url=/inventario/v3/api-docs
