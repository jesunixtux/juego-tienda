spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  cloud:
    loadbalancer:
      cache:
        enabled: false
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origin-patterns:
                  - "http://localhost:*"
                  - "http://127.0.0.1:*"
                  - "http://[::1]:*"
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowed-headers:
                  - "*"
          routes:
            - id: videojuegos
              uri: "lb://videojuegos"
              predicates:
                - "Path=/videojuegos,/videojuegos/**"
            - id: carrito
              uri: "lb://carrito"
              predicates:
                - "Path=/carrito,/carrito/**"
            - id: usuarios
              uri: "lb://usuarios"
              predicates:
                - "Path=/usuarios,/usuarios/**"
            - id: inventario
              uri: "lb://inventario"
              predicates:
                - "Path=/inventario,/inventario/**"
            - id: authentication
              uri: "lb://authentication"
              predicates:
                - "Path=/auth,/auth/**"
            - id: pagos
              uri: "lb://pagos"
              predicates:
                - "Path=/pagos,/pagos/**"
            - id: pedidos
              uri: "lb://pedidos"
              predicates:
                - "Path=/pedidos,/pedidos/**"
            - id: resenas
              uri: "lb://resenas"
              predicates:
                - "Path=/resenas,/resenas/**"

server:
  port: "${API_GATEWAY_PORT:8080}"

eureka:
  client:
    registry-fetch-interval-seconds: 5
    service-url:
      defaultZone: "${EUREKA_SERVER_URL:http://localhost:8761/eureka/}"
  instance:
    hostname: "${EUREKA_INSTANCE_HOSTNAME:localhost}"
    prefer-ip-address: "${EUREKA_PREFER_IP_ADDRESS:false}"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls-primary-name: Videojuegos
    try-it-out-enabled: true
    display-request-duration: true
    deep-linking: true
    doc-expansion: none
    operations-sorter: method
    tags-sorter: alpha
    supported-submit-methods:
      - get
      - post
      - put
      - delete
      - patch
      - options
    urls:
      - name: Videojuegos
        url: /videojuegos/v3/api-docs
      - name: Usuarios
        url: /usuarios/v3/api-docs
      - name: Authentication
        url: /auth/v3/api-docs
      - name: Carrito
        url: /carrito/v3/api-docs
      - name: Pagos
        url: /pagos/v3/api-docs
      - name: Pedidos
        url: /pedidos/v3/api-docs
      - name: Resenas
        url: /resenas/v3/api-docs
      - name: Inventario
        url: /inventario/v3/api-docs
